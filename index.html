<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Result Summary</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="result">

        <h3>Your Result</h3>

        <div class="circle">
            <h1>76</h1>
            <p>of 100</p>
        </div>

        <h2>Great</h2>

        <p class="comparison">
            You scored higher than 65% of the people
            who have taken these tests.
        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="summary">

        <h2>Summary</h2>

        <div class="summary-item reaction">
            <p>Reaction</p>
            <p><span>80</span> / 100</p>
        </div>

        <div class="summary-item memory">
            <p>Memory</p>
            <p><span>92</span> / 100</p>
        </div>

        <div class="summary-item verbal">
            <p>Verbal</p>
            <p><span>61</span> / 100</p>
        </div>

        <div class="summary-item visual">
            <p>Visual</p>
            <p><span>73</span> / 100</p>
        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>

</body>


</html>
